# This workflow will do a clean install of node dependencies, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

# If adding a step that requires SECRETS or WRITE ACCESS be sure to have dependabot skip it.
# > if: ${{ github.actor != 'dependabot[bot]' }}

name: Pull Request Build

on:
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest ]
        node: [ 22, 24 ]

    steps:
      - name: Checkout Code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Derive appropriate SHAs for base and head for `nx affected` commands
        uses: nrwl/nx-set-shas@afb73a62d26e41464e9254689e1fd6122ee683c1 # v5.0.1
        with:
          main-branch-name: "master"

      - name: Set Node Version
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}

      - name: Get yarn cache directory path
        id: yarn-cache-dir-path
        run: |
          echo "dir=$(yarn config get cacheFolder)" >> $GITHUB_OUTPUT

      - name: Restore yarn cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: yarn-cache
        with:
          path: ${{ steps.yarn-cache-dir-path.outputs.dir }}
          key: ${{ runner.os }}-${{ matrix.node }}-yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.node }}-yarn-

      - name: Restore Nx cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .nx/cache
          key: ${{ runner.os }}-${{ matrix.node }}-nx-${{ hashFiles('yarn.lock') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.node }}-nx-${{ hashFiles('yarn.lock') }}-
            ${{ runner.os }}-${{ matrix.node }}-nx-

      - name: Install Dependencies
        run: yarn install --immutable

      - name: Check Constraints
        run: yarn constraints

      - name: Lint Affected Code
        run: yarn nx affected --target=lint

      - name: Unit Test Affected Code
        run: yarn nx affected --target=test

      - name: Integration Test Affected Code
        run: yarn nx affected --target=integration

      - name: Version Bump Dry Run
        run: yarn version:dry-run

      - name: Build Docs
        if: ${{ matrix.node == 24 }}
        run: yarn build:docs

      - name: Build App
        run: yarn build:app
